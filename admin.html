<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thakarshi Fab - Admin Panel</title>
    <style>
        :root {
            --primary: #8B0000;
            --primary-light: #a50000;
            --primary-dark: #660000;
            --secondary: #28a745;
            --secondary-light: #34ce57;
            --accent: #1e88e5;
            --light: #f8f9fa;
            --lighter: #f1f3f5;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            --success: #28a745;
            --info: #17a2b8;
            --warning: #ffc107;
            --danger: #dc3545;
            --white: #ffffff;
            --black: #000000;

            --radius-sm: 4px;
            --radius: 8px;
            --radius-lg: 12px;
            --radius-pill: 50px;

            --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            --transition-fast: 0.15s;
            --transition: 0.25s;
            --transition-slow: 0.35s;

            --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
            --shadow-md: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23);
            --shadow-lg: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
            --shadow-xl: 0 20px 25px rgba(0,0,0,0.15), 0 10px 10px rgba(0,0,0,0.22);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            background-color: var(--gray-100);
            color: var(--gray-900);
            line-height: 1.6;
        }

        body::-webkit-scrollbar {
            width: 8px;
        }

        body::-webkit-scrollbar-track {
            background: var(--gray-100);
        }

        body::-webkit-scrollbar-thumb {
            background-color: var(--gray-300);
            border-radius: 4px;
        }

        body::-webkit-scrollbar-thumb:hover {
            background-color: var(--gray-400);
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header {
            background: var(--primary);
            color: var(--white);
            text-align: center;
            padding: 3rem 1.5rem;
            margin-bottom: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ---------- Admin Styles ---------- */
        .section {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            border: 1px solid var(--gray-200);
        }

        .section h2 {
            margin-bottom: 1.5rem;
            color: var(--primary);
            text-align: center;
            font-size: 1.75rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.875rem 1.125rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            font-size: 1rem;
            background: var(--white);
            color: var(--gray-900);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .product-image-preview {
            margin-top: 1rem;
            max-width: 260px;
            max-height: 260px;
            border: 2px dashed var(--gray-400);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            transition: border-color var(--transition), background-color var(--transition);
        }

        .product-image-preview:hover {
            border-color: var(--primary);
            background-color: rgba(139, 0, 0, 0.05);
        }

        .product-image-preview img {
            max-width: 100%;
            max-height: 100%;
            border-radius: var(--radius);
            display: block;
        }

        .submit-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 0.875rem 2rem;
            font-size: 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: background var(--transition), transform var(--transition);
            width: 100%;
            display: block;
        }

        .submit-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .form-status {
            margin-top: 1rem;
            padding: 0.875rem;
            border-radius: var(--radius);
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .form-status.success {
            background: rgba(212, 237, 218, 0.5);
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .form-status.error {
            background: rgba(248, 215, 218, 0.5);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .inquiries-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 1.5rem;
        }

        .inquiries-table th,
        .inquiries-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        .inquiries-table th {
            background-color: var(--gray-100);
            font-weight: 600;
            color: var(--gray-700);
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.5px;
        }

        .inquiries-table tr:hover {
            background-color: var(--gray-50);
        }

        .inquiry-status {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-pill);
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .inquiry-status.new {
            background-color: rgba(255, 193, 7, 0.1);
            color: #ffc107;
        }

        .inquiry-status.read {
            background-color: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }

        .inquiry-status.replied {
            background-color: rgba(23, 162, 184, 0.1);
            color: #17a2b8;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .product-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform var(--transition), box-shadow var(--transition);
            border: 1px solid var(--gray-200);
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--gray-300);
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border: none;
        }

        .product-card h3 {
            margin: 0 0 1rem 0;
            color: var(--primary);
            font-size: 1.25rem;
            font-weight: 600;
        }

        .product-card p {
            color: var(--gray-700);
            line-height: 1.6;
            margin-bottom: 1.25rem;
            flex-grow: 1;
        }

        .product-card .actions {
            margin-top: auto;
            padding: 1.25rem;
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: 0.75rem;
        }

        .product-card .actions button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background var(--transition), transform var(--transition);
        }

        .product-card .actions .edit {
            background: #ffc107;
            color: #212529;
        }

        .product-card .actions .edit:hover {
            background: #e0a800;
        }

        .product-card .actions .delete {
            background: #dc3545;
            color: var(--white);
        }

        .product-card .actions .delete:hover {
            background: #c82333;
        }

        /* Product tags styling - matching public site */
        .product-tags {
            display: flex;
            gap: 0.75rem;
            margin: 1rem 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .category-tag {
            background: rgba(139, 0, 0, 0.1);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-pill);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .price-tag {
            background: rgba(255, 152, 0, 0.1);
            color: #ff9800;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-pill);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .auth-box {
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            max-width: 420px;
            margin: 2rem auto;
        }

        .auth-box h3 {
            margin-bottom: 1.75rem;
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .auth-box input {
            width: 100%;
            padding: 0.875rem 1.125rem;
            margin-top: 0.5rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .auth-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 0, 0, 0.2);
        }

        .auth-box button {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.875rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: background var(--transition);
        }

        .auth-box button:hover {
            background: var(--primary-light);
        }

        .auth-switch {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.95rem;
            color: var(--gray-600);
        }

        .auth-switch a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .user-info {
            text-align: right;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            color: var(--gray-600);
        }

        .user-info button {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .user-info button:hover {
            background: rgba(139, 0, 0, 0.1);
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }

            .inquiries-table th,
            .inquiries-table td {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>Thakarshi Fab</h1>
    <p>Textile Wholesale | Ahmedabad</p>
</header>

<div class="container">
    <!-- Auth Status -->
    <div id="authStatus" class="user-info"></div>

    <!-- Auth Forms (shown when not signed in) -->
    <div id="authForms" class="auth-box" style="display:none;">
        <h3 id="authTitle">Sign in to continue</h3>
        <form id="authForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="authSubmit">Sign In</button>
        </form>
        <p class="auth-switch">
            Don’t have an account? <a id="toggleLink" href="#">Create one</a>
        </p>
        <div id="authMsg" style="margin-top:1rem;min-height:1.2rem;"></div>
    </div>

    <!-- Product Management Section -->
    <section class="section" id="productSection" style="display:none;">
        <h2>Product Management</h2>

        <!-- Add Product Form -->
        <div class="product-form">
            <h3>Add New Product</h3>
            <form id="productForm">
                <div class="form-group">
                    <label for="prodName">Product Name *</label>
                    <input type="text" id="prodName" name="prodName" required>
                </div>
                <div class="form-group">
                    <label for="prodDesc">Description *</label>
                    <textarea id="prodDesc" name="prodDesc" required></textarea>
                </div>
                <div class="form-group">
                    <label for="prodCategory">Category *</label>
                    <select id="prodCategory" name="prodCategory" required>
                        <option value="">Select Category</option>
                        <option value="cotton">Cotton</option>
                        <option value="silk">Silk</option>
                        <option value="wool">Wool</option>
                        <option value="linen">Linen</option>
                        <option value="polyester">Polyester</option>
                        <option value="blend">Blend</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="prodPrice">Price (per meter/yard) *</label>
                    <input type="number" id="prodPrice" name="prodPrice" step="0.01" min="0" required>
                    <small>Enter price in your local currency</small>
                </div>
                <div class="form-group">
                    <label for="prodImage">Product Image (JPG/PNG, max 2MB)</label>
                    <input type="file" id="prodImage" name="prodImage" accept=".jpg,.jpeg,.png">
                    <small>Max size 2MB</small>
                    <div id="imagePreview" class="product-image-preview">No file chosen</div>
                </div>
                <button type="submit" class="submit-btn" id="submitProductBtn">Add Product</button>
                <div class="form-status" id="formStatus"></div>
            </form>
        </div>

        <!-- Product List -->
        <div class="product-list">
            <h3>Existing Products</h3>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <!-- Inquiries Section -->
    <section class="section" id="inquiriesSection" style="display:none;">
        <h2>Customer Inquiries</h2>
        <div id="inquiriesGrid">
            <p>Loading inquiries...</p>
        </div>
    </section>
</div>

<!-- Firebase SDKs (Auth & Firestore only - no Storage needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* --------------------------------------------------------------
   1️⃣  Firebase configuration – REPLACE THE PLACEHOLDERS BELOW
   -------------------------------------------------------------- */
const firebaseConfig = {
    apiKey: "AIzaSyDBddHlxJnVTAuUX_kymp6zIYPOvT5cLNA",
    authDomain: "thakarshi-product-catalogue.firebaseapp.com",
    projectId: "thakarshi-product-catalogue",
    storageBucket: "thakarshi-product-catalogue.appspot.com", // Kept for config but not used
    messagingSenderId: "149758378550",
    appId: "1:149758378550:web:2b6def7e29932dddf34e97"
    // measurementId: "G-YMPTV9G8FN" // optional, if you enabled Analytics
};
/* -------------------------------------------------------------- */

/* --------------------------------------------------------------
   2️⃣  Initialize Firebase (Auth & Firestore only)
   -------------------------------------------------------------- */
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
// Note: The storage instance has been removed since we're no longer using Firebase Storage for image uploads. We're now leveraging Cloudinary for this functionality instead.
/* -------------------------------------------------------------- */

/* --------------------------------------------------------------
   3️⃣  Cloudinary Configuration
   -------------------------------------------------------------- */
const CLOUDINARY_CLOUD_NAME = 'ubqtf5go'; // Your Cloudinary cloud name
const CLOUDINARY_UPLOAD_PRESET = 'thakarshi_product_upload'; // Your unsigned upload preset
// Cloudinary upload endpoint: https://api.cloudinary.com/v1_1/{cloud_name}/image/upload
/* -------------------------------------------------------------- */

/* --------------------------------------------------------------
   4️⃣  UI element references
   -------------------------------------------------------------- */
const authStatusEl   = document.getElementById('authStatus');
const authFormsEl    = document.getElementById('authForms');
const authTitleEl    = document.getElementById('authTitle');
const authFormEl     = document.getElementById('authForm');
const emailInput     = document.getElementById('email');
const passwordInput  = document.getElementById('password');
const authSubmitBtn  = document.getElementById('authSubmit');
const toggleLink     = document.getElementById('toggleLink');
const authMsgEl      = document.getElementById('authMsg');

const productSectionEl = document.getElementById('productSection');
const productForm    = document.getElementById('productForm');
const prodNameInput  = document.getElementById('prodName');
const prodDescInput  = document.getElementById('prodDesc');
const prodImageInput = document.getElementById('prodImage');
const imagePreview   = document.getElementById('imagePreview');
const submitProductBtn = document.getElementById('submitProductBtn');
const productFormStatusEl = document.getElementById('formStatus');

const productsGrid   = document.getElementById('productsGrid');
const inquiriesGrid  = document.getElementById('inquiriesGrid');

let isLoginMode = true; // toggles between Sign‑In / Sign‑Up
let currentUser = null;
let isAdmin = false;
/* -------------------------------------------------------------- */

/* --------------------------------------------------------------
   5️⃣  Auth state listener – shows/hides UI based on login
   -------------------------------------------------------------- */
auth.onAuthStateChanged(user => {
    if (user) {
        // User signed in
        currentUser = user;
        authStatusEl.innerHTML = `
            Signed in as <strong>${user.email}</strong>
            <button id="signOutBtn">Sign out</button>
        `;
        authFormsEl.style.display = 'none';
        document.getElementById('signOutBtn')
                .addEventListener('click', () => auth.signOut());

        // Check if user is admin
        checkIfAdmin(user.email).then(isAdminFlag => {
            isAdmin = isAdminFlag;
            if (isAdmin) {
                // Show admin sections
                productSectionEl.style.display = 'block';
                document.getElementById('inquiriesSection').style.display = 'block';
                loadProducts(); // load existing products
                loadInquiries(); // load inquiries(); else {
                // Not authorized: loading inquiries
            } else {
                // Not authorized: show error and sign out after delay
                authStatusEl.innerHTML += '<p style="color:red;">You are not authorized to access the admin panel.</p>';
                setTimeout(() => {
                    auth.signOut();
                }, 2000);
            }
        }).catch(err => {
            console.error('Error checking admin status:', err);
            authStatusEl.innerHTML += '<p style="color:red;">Error checking permissions.</p>';
            setTimeout(() => {
                auth.signOut();
            }, 2000);
        });

    } else {
        // User signed out
        currentUser = null;
        isAdmin = false;
        authStatusEl.innerHTML = '';
        authFormsEl.style.display = 'block';
        productSectionEl.style.display = 'none';
        document.getElementById('inquiriesSection').style.display = 'none';
        // Reset auth form
        authFormEl.reset();
    }
});

/* --------------------------------------------------------------
   6️⃣  Auth form handling (login / signup)
   -------------------------------------------------------------- */
authFormEl.addEventListener('submit', e => {
    e.preventDefault();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    authMsgEl.textContent = '';
    authSubmitBtn.disabled = true;

    if (isLoginMode) {
        auth.signInWithEmailAndPassword(email, password)
            .catch(err => {
                authMsgEl.textContent = err.message;
                authSubmitBtn.disabled = false;
            });
    } else {
        auth.createUserWithEmailAndPassword(email, password)
            .catch(err => {
                authMsgEl.textContent = err.message;
                authSubmitBtn.disabled = false;
            });
    }
});

toggleLink.addEventListener('click', e => {
    e.preventDefault();
    isLoginMode = !isLoginMode;
    authTitleEl.textContent = isLoginMode ? 'Sign in to continue' : 'Create account';
    authSubmitBtn.textContent = isLoginMode ? 'Sign In' : 'Sign Up';
    toggleLink.innerHTML = isLoginMode
        ? 'Don’t have an account? <a href="#">Create one</a>'
        : 'Already have an account? <a href="#">Sign in</a>';
    // Re-attach click listener because we replaced innerHTML
    toggleLink.querySelector('a').addEventListener('click', e => {
        e.preventDefault();
        toggleLink.click();
    });
    authMsgEl.textContent = '';
});

/* --------------------------------------------------------------
   7️⃣  Helper: check if user is admin
   -------------------------------------------------------------- */
async function checkIfAdmin(email) {
    if (!email) return false;
    const docRef = db.collection('admins').doc(email);
    const docSnap = await docRef.get();
    return docSnap.exists;
}

/* --------------------------------------------------------------
   8️⃣  Product form: image preview
   -------------------------------------------------------------- */
prodImageInput.addEventListener('change', () => {
    const file = prodImageInput.files[0];
    if (!file) {
        imagePreview.textContent = 'No file chosen';
        imagePreview.style.background = 'none';
        imagePreview.innerHTML = '';
        return;
    }
    // Validate file type and size
    if (!file.type.match('image/(jpe?g|png)')) {
        alert('Please upload a JPG or PNG image.');
        prodImageInput.value = '';
        imagePreview.textContent = 'Invalid file type';
        return;
    }
    if (file.size > 2 * 1024 * 1024) { // 2MB
        alert('File size must be under 2 MB.');
        prodImageInput.value = '';
        imagePreview.textContent = 'File too large';
        return;
    }
    const reader = new FileReader();
    reader.onload = e => {
        imagePreview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
    };
    reader.readAsDataURL(file);
});

/* --------------------------------------------------------------
   9️⃣  Product form submission – upload image to Cloudinary, save to Firestore
   -------------------------------------------------------------- */
productForm.addEventListener('submit', async e => {
    e.preventDefault();
    submitProductBtn.disabled = true;
    submitProductBtn.textContent = 'Adding...';
    productFormStatusEl.style.display = 'none';

    const name = prodNameInput.value.trim();
    const desc = prodDescInput.value.trim();
    const category = prodCategorySelect.value;
    const price = parseFloat(prodPriceInput.value);
    const file = prodImageInput.files[0];

    if (!name || !desc) {
        showFormError('Please fill in all required fields.');
        return;
    }
    if (!category) {
        showFormError('Please select a category.');
        return;
    }
    if (isNaN(price) || price <= 0) {
        showFormError('Please enter a valid price greater than 0.');
        return;
    }
    if (!file) {
        showFormError('Please select an image.');
        return;
    }

    try {
        // 1) Upload image to Cloudinary (UNSIGNED - no auth needed)
        const uploadPreset = CLOUDINARY_UPLOAD_PRESET;
        const cloudName = CLOUDINARY_CLOUD_NAME;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', uploadPreset);

        const uploadResponse = await fetch(
            `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
            {
                method: 'POST',
                body: formData
            }
        );

        const uploadResult = await uploadResponse.json();
        if (!uploadResponse.ok) throw new Error(uploadResult.error?.message || 'Upload failed');

        const imageUrl = uploadResult.secure_url; // This is the URL we'll store

        // 2) Save product document to Firestore
        await db.collection('products').add({
            name,
            description: desc,
            category: prodCategorySelect.value,
            price: parseFloat(prodPriceInput.value),
            imageUrl: imageUrl, // ← Now using Cloudinary URL
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // 3) Reset UI and show success
        showFormSuccess('Product added successfully!');
        productForm.reset();
        imagePreview.innerHTML = 'No file chosen';
        loadProducts(); // Refresh product list
    } catch (err) {
        console.error('Error adding product:', err);
        showFormError('Error adding product: ' + err.message);
    } finally {
        submitProductBtn.disabled = false;
        submitProductBtn.textContent = 'Add Product';
    }
});

function showFormError(msg) {
    productFormStatusEl.textContent = msg;
    productFormStatusEl.className = 'form-status error';
    productFormStatusEl.style.display = 'block';
}
function showFormSuccess(msg) {
    productFormStatusEl.textContent = msg;
    productFormStatusEl.className = 'form-status success';
    productFormStatusEl.style.display = 'block';
}

/* --------------------------------------------------------------
   🔟  Load and render products from Firestore (real-time)
   -------------------------------------------------------------- */
function loadProducts() {
    // Clear existing
    productsGrid.innerHTML = '<p>Loading products...</p>';

    const productsRef = db.collection('products').orderBy('createdAt', 'desc');
    const unsubscribe = productsRef.onSnapshot(snapshot => {
        productsGrid.innerHTML = ''; // clear loading message
        if (snapshot.empty) {
            productsGrid.innerHTML = '<p>No products yet.</p>';
            return;
        }
        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${data.imageUrl}" alt="${data.name}">
                <h3>${data.name}</h3>
                <div class="product-tags">
                    <span class="category-tag">${data.category || 'Other'}</span>
                    <span class="price-tag">₹${parseFloat(data.price).toLocaleString()}</span>
                </div>
                <p>${data.description}</p>
                <div class="actions">
                    <button class="edit" data-id="${id}">Edit</button>
                    <button class="delete" data-id="${id}">Delete</button>
                </div>
            `;
            productsGrid.appendChild(card);

            // Attach event listeners for edit/delete (optional for now)
            // For simplicity, we'll just show alert that functionality is coming.
            card.querySelector('.edit').addEventListener('click', e => {
                e.stopPropagation();
                alert('Edit functionality coming soon.');
            });
            card.querySelector('.delete').addEventListener('click', async e => {
                e.stopPropagation();
                if (!confirm('Delete this product?')) return;
                try {
                    // When using Cloudinary, we don't need to delete from storage explicitly
                    // as we're not storing anything in Firebase Storage
                    // The image remains in Cloudinary (you can set up auto-cleanup policies there if needed)

                    // Delete Firestore doc
                    await db.collection('products').doc(id).delete();
                } catch (err) {
                    console.error('Error deleting product:', err);
                    alert('Could not delete product: ' + err.message);
                }
            });
        });
    });

    // We could return unsubscribe to detach later, but for simplicity ignore.
}

/* --------------------------------------------------------------
   1️⃣1️⃣  Load and render inquiries from Firestore (real-time)
   -------------------------------------------------------------- */
function loadInquiries() {
    inquiriesGrid.innerHTML = '<p>Loading inquiries...</p>';

    const inquiriesRef = db.collection('inquiries').orderBy('timestamp', 'desc');
    const unsubscribe = inquiriesRef.onSnapshot(snapshot => {
        if (snapshot.empty) {
            inquiriesGrid.innerHTML = '<p>No inquiries yet.</p>';
            return;
        }

        // Build HTML table
        let tableHTML = `
            <table class="inquiries-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>City</th>
                        <th>Selected Products</th>
                        <th>Message</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
        `;

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;

            let dateStr = 'Unknown';
            if (data.timestamp) {
                const date = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
                dateStr = date.toLocaleString();
            }

            let productsStr = '';
            if (data.selectedProducts && Array.isArray(data.selectedProducts)) {
                productsStr = data.selectedProducts.map(p => p.name || p).join(', ');
            } else {
                productsStr = 'None';
            }

            const message = data.message || '';
            const displayMessage = message.length > 50 ? message.substring(0, 50) + '...' : message;

            tableHTML += `
                <tr>
                    <td>${data.name || ''}</td>
                    <td>${data.email || ''}</td>
                    <td>${data.phone || ''}</td>
                    <td>${data.city || ''}</td>
                    <td>${productsStr}</td>
                    <td title="${message}">${displayMessage}</td>
                    <td>${dateStr}</td>
                    <td><span class="inquiry-status">New</span></td>
                </tr>
            `;
        });

        tableHTML += `
                </tbody>
            </table>
        `;

        inquiriesGrid.innerHTML = tableHTML;
    });

    // We could return unsubscribe to detach later, but for simplicity ignore.
}
