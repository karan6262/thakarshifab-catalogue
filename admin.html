<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Thakarshi Fab</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Hide the admin container until we verify the user */
        #adminContent {
            display: none; 
        }
        .admin-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }
        .progress-text {
            display: none;
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            color: var(--accent);
        }
        .help-text {
            display: block;
            font-size: 0.8rem;
            color: var(--gray-600);
            margin-top: 4px;
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-container">
        <div class="logo">
            <h1>Thakarshi Fab Admin</h1>
            <p>Automated Upload Portal</p>
        </div>
        <nav class="header-nav">
            <a href="index.html" class="btn-primary" style="padding: 10px 20px; font-size: 0.9rem;">Back to Store</a>
        </nav>
    </div>
</header>

<div class="container" id="adminContent">
    <div class="admin-container">
        <h2 style="margin-bottom: 25px; color: var(--primary);">Add New Fabric</h2>
        
        <form id="uploadForm">
            <div class="form-group">
                <label>Fabric Name</label>
                <input type="text" id="prodName" required placeholder="e.g., Premium Navy Suiting">
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="prodCategory" required>
                    <option value="cotton">Cotton</option>
                    <option value="silk">Silk</option>
                    <option value="linen">Linen</option>
                    <option value="blend">Blends</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Price per Meter (₹)</label>
                <input type="number" id="prodPrice" required placeholder="e.g., 450">
            </div>

            <div class="form-group">
                <label>Product Images</label>
                <input type="file" id="prodImages" accept="image/*" multiple required>
                <span class="help-text">Hold Ctrl (Windows) or Cmd (Mac) to select multiple images.</span>
            </div>

            <div class="form-group">
                <label>Transition Video (Hover Effect)</label>
                <input type="file" id="prodVideo" accept="video/mp4,video/webm" >
            </div>

            <button type="submit" class="submit-btn" id="uploadBtn">Upload Product to Catalog</button>
            <div id="progressText" class="progress-text">Initializing upload...</div>
            <div id="statusMsg" class="form-status"></div>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// REPLACE WITH YOUR ACTUAL ADMIN EMAIL
const ADMIN_EMAIL = "shahkaran6262@gmail.com"; 

const CLOUD_NAME = "YOUR_CLOUD_NAME"; 
const UPLOAD_PRESET = "YOUR_UPLOAD_PRESET"; 
const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

const firebaseConfig = {
    apiKey: "AIzaSyDBddHlxJnVTAuUX_kymp6zIYPOvT5cLNA",
    authDomain: "thakarshi-product-catalogue.firebaseapp.com",
    projectId: "thakarshi-product-catalogue",
    storageBucket: "thakarshi-product-catalogue.appspot.com",
    messagingSenderId: "149758378550",
    appId: "1:149758378550:web:2b6def7e29932dddf34e97"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- SECURITY CHECK ---
auth.onAuthStateChanged(user => {
    if (user && user.email === ADMIN_EMAIL) {
        // User is the admin, show the dashboard
        document.getElementById('adminContent').style.display = 'block';
    } else {
        // Not the admin (or not logged in). Kick them out!
        alert("Unauthorized Access. Redirecting to the store.");
        window.location.href = "index.html";
    }
});

const uploadForm = document.getElementById('uploadForm');
const uploadBtn = document.getElementById('uploadBtn');
const progressText = document.getElementById('progressText');
const statusMsg = document.getElementById('statusMsg');

async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);

    const response = await fetch(CLOUDINARY_URL, {
        method: 'POST',
        body: formData
    });

    if (!response.ok) throw new Error('Failed to upload media to Cloudinary');
    const data = await response.json();
    return data.secure_url; 
}

uploadForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    uploadBtn.disabled = true;
    progressText.style.display = 'block';
    statusMsg.style.display = 'none';

    const name = document.getElementById('prodName').value.trim();
    const category = document.getElementById('prodCategory').value;
    const price = document.getElementById('prodPrice').value;
    const imageFiles = document.getElementById('prodImages').files; 
    const videoFile = document.getElementById('prodVideo').files[0];

    try {
        const imageUrls = [];
        
        for (let i = 0; i < imageFiles.length; i++) {
            progressText.textContent = `Uploading Image ${i + 1} of ${imageFiles.length}...`;
            const url = await uploadToCloudinary(imageFiles[i]);
            imageUrls.push(url);
        }

        progressText.textContent = 'Uploading Transition Video...';
        const videoUrl = await uploadToCloudinary(videoFile);

        progressText.textContent = 'Saving data to Thakarshi Fab catalog...';
        await db.collection('products').add({
            name: name,
            category: category,
            price: Number(price),
            imageUrls: imageUrls, 
            videoUrl: videoUrl, 
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        statusMsg.textContent = 'Success! Product added and is now live on the website.';
        statusMsg.className = 'form-status success';
        statusMsg.style.display = 'block';
        uploadForm.reset();

    } catch (error) {
        console.error("Upload process failed: ", error);
        statusMsg.textContent = 'Error: ' + error.message;
        statusMsg.className = 'form-status error';
        statusMsg.style.display = 'block';
    } finally {
        uploadBtn.disabled = false;
        progressText.style.display = 'none';
    }
});
</script>
</body>
</html>
