<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thakarshi Fab - Textile Wholesale | Ahmedabad</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .connect-section { background: linear-gradient(135deg, #8B6B4E 0%, #594331 100%); color: var(--white); text-align: center; padding: 4rem 1.5rem; margin-top: 4rem; margin-bottom: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
        .connect-section h2 { font-size: 2.2rem; margin-bottom: 1rem; }
        .contact-grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; margin-top: 35px; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .contact-card { flex: 1; min-width: 300px; background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: var(--radius); text-align: left; font-size: 1.05rem; border: 1px solid rgba(255, 255, 255, 0.15); }
        .contact-card h3 { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.25); color: #f1dfc8; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .contact-card p { margin-bottom: 14px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.5; }
        
        .hover-link { cursor: pointer; transition: color 0.2s; }
        .hover-link:hover { color: var(--primary); }
        .product-media img { cursor: pointer; }

        #productDetailsModal { display: none; }
        #productDetailsModal.show-modal { display: flex !important; align-items: center; justify-content: center; }
        
        .pd-content {
            display: flex; flex-direction: row; background: #fff; width: 90%; max-width: 1000px; height: 80vh; 
            border-radius: var(--radius-lg); overflow: hidden; position: relative; box-shadow: var(--shadow-lg);
        }
        
        .pd-gallery-section {
            flex: 1.2; background: #f9f9f9; display: flex; align-items: center; justify-content: center; 
            position: relative; overflow: hidden; border-right: 1px solid var(--gray-200);
        }
        .pd-gallery-section img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .pd-info-section {
            flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; background: var(--white);
        }
        
        .pd-close {
            position: absolute; top: 15px; right: 20px; font-size: 2.2rem; cursor: pointer; color: #333; 
            z-index: 10; background: rgba(255,255,255,0.9); border-radius: 50%; width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; line-height: 1; box-shadow: var(--shadow-sm);
        }
        .pd-close:hover { background: #eee; }
        
        .pd-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white;
            border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 1.2rem; 
            display: flex; align-items: center; justify-content: center; z-index: 5; transition: background 0.2s;
        }
        .pd-arrow:hover { background: rgba(0,0,0,0.8); }
        .pd-arrow-left { left: 15px; }
        .pd-arrow-right { right: 15px; }

        @media (max-width: 768px) {
            .pd-content { flex-direction: column; height: 90vh; }
            .pd-gallery-section { flex: 0.8; border-right: none; border-bottom: 1px solid var(--gray-200); }
            .pd-info-section { flex: 1; padding: 25px; }
            .pd-close { top: 10px; right: 10px; width: 35px; height: 35px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-container">
        <div class="logo">
            <h1>Thakarshi Fab</h1>
            <p>Textile Wholesale | Ahmedabad</p>
        </div>
        <nav class="header-nav">
            <button class="inquiry-btn" id="openCartModal" style="display:none;">Inquiry Cart <span>(0)</span></button>
        </nav>
    </div>
</header>

<div class="container">
    <div id="authStatus" class="user-info" style="text-align: center; margin-bottom: 20px; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;"></div>

    <section id="productsSection" class="catalog-section">
        <!-- JS will inject filters, search, skeletons, and products here -->
    </section>

    <!-- Load More Button -->
    <div id="loadMoreContainer" style="text-align: center; margin-top: 30px; margin-bottom: 40px; display: none;">
        <button id="loadMoreBtn" class="btn-primary" style="background-color: #1a1a1a; padding: 12px 30px;">Load More Fabrics</button>
    </div>

    <!-- DYNAMIC CONNECT WITH US SECTION -->
    <section class="connect-section" id="connectSection" style="display: none;">
        <h2>Connect With Us</h2>
        <p id="connectDesc" style="font-size: 1.1rem; opacity: 0.9;">Loading details...</p>
        <div class="contact-grid" id="contactGrid"></div>
    </section>
</div>

<!-- Sign In Modal -->
<div id="signInModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeSignInModal">&times;</span>
        <h2>Sign In</h2>
        <form id="modalAuthForm">
            <div class="form-group"><input type="email" id="modalEmail" placeholder="Email" required></div>
            <div class="form-group"><input type="password" id="modalPassword" placeholder="Password" required></div>
            <button type="submit" class="submit-btn" id="modalAuthSubmit">Sign In</button>
        </form>
        <p class="auth-switch" id="modalAuthSwitch" style="text-align: center; margin-top: 15px;">
            Don’t have an account? <a id="modalToggleLink" href="#">Create one</a>
        </p>
        <div id="modalAuthMsg" style="margin-top:1rem; color: red; text-align: center;"></div>
    </div>
</div>

<!-- BIG PRODUCT DETAILS MODAL -->
<div id="productDetailsModal" class="modal" style="z-index: 2500;">
    <div class="pd-content">
        <span class="pd-close" onclick="closeProductModal()">&times;</span>
        
        <div class="pd-gallery-section">
            <img id="pdMainImage" src="" alt="Product view">
            <button class="pd-arrow pd-arrow-left" id="pdPrevBtn" onclick="changePdImage(-1)">&#10094;</button>
            <button class="pd-arrow pd-arrow-right" id="pdNextBtn" onclick="changePdImage(1)">&#10095;</button>
        </div>
        
        <div class="pd-info-section">
            <span id="pdCategory" style="color: #666; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; font-weight: bold;"></span>
            <h2 id="pdName" style="margin: 8px 0 15px 0; font-size: 2rem; color: var(--gray-900);"></h2>
            
            <div style="background: var(--gray-100); padding: 15px; border-radius: 8px; margin-bottom: 25px; border-left: 4px solid var(--primary);">
                <h3 id="pdPrice" style="color: var(--primary); margin: 0; font-size: 1.6rem;"></h3>
            </div>
            
            <div style="flex-grow: 1;">
                <h4 style="margin-bottom: 12px; font-size: 1.1rem; color: #333;">Product Description</h4>
                <p id="pdDesc" style="line-height: 1.7; color: #555; font-size: 1rem; white-space: pre-wrap;"></p>
            </div>
            
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
                <button id="pdAddBtn" class="btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem; border-radius: 8px; background-color: #1a1a1a;" onclick="toggleSelection(event)"></button>
            </div>
        </div>
    </div>
</div>

<!-- Send Inquiry Details Modal -->
<div id="cartModal" class="modal">
    <div class="modal-content" style="max-height: 85vh; display: flex; flex-direction: column;">
        <span class="close-btn" id="closeCartModal">&times;</span>
        <h2 style="margin-bottom: 15px;">Send Inquiry</h2>
        <form id="modalInquiryForm" style="overflow-y: auto; padding-right: 5px; flex-grow: 1;">
            <input type="hidden" id="modalSelectedProducts" name="selectedProducts" value="">
            <div class="form-group" style="margin-bottom: 1rem;"><label>Full Name *</label><input type="text" id="modalName" required></div>
            <div class="form-group" style="margin-bottom: 1rem;"><label>Email Address *</label><input type="email" id="modalEmail2" required></div>
            <div class="form-group" style="margin-bottom: 1rem;"><label>Phone Number</label><input type="tel" id="modalPhone"></div>
            <div class="form-group" style="margin-bottom: 1rem;"><label>City</label><input type="text" id="modalCity"></div>
            <div class="form-group" style="margin-bottom: 1rem;"><label>Additional Message / Requirements</label><textarea id="modalMessage" style="min-height: 80px;"></textarea></div>
            <button type="submit" class="submit-btn" id="modalSubmitBtn">Send Inquiry</button>
            <div class="form-status" id="modalFormStatus"></div>
        </form>
    </div>
</div>

<!-- Toast & Slide Cart -->
<div id="toast" class="toast">Item added to inquiry!</div>
<div id="cartOverlay" class="cart-overlay"></div>
<div id="slideOutCart" class="slide-out-cart">
    <div class="cart-header"><h2>Your Inquiry Cart</h2><button id="closeSlideCart" class="close-cart-btn">&times;</button></div>
    <div class="cart-body"><ul id="selectedList" class="cart-items-list"></ul><div id="emptyCartMsg" class="empty-cart-msg">Your inquiry list is empty.</div></div>
    <div class="cart-footer"><button id="proceedToInquiryBtn" class="btn-primary" style="width: 100%; display: none;">Proceed to Details</button></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
// REPLACE WITH YOUR ACTUAL KEYS!
const EMAILJS_PUBLIC_KEY = "YOUR_EMAILJS_PUBLIC_KEY";
const EMAILJS_SERVICE_ID = "YOUR_EMAILJS_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "YOUR_EMAILJS_TEMPLATE_ID";

emailjs.init(EMAILJS_PUBLIC_KEY);

const firebaseConfig = {
    apiKey: "AIzaSyDBddHlxJnVTAuUX_kymp6zIYPOvT5cLNA",
    authDomain: "thakarshi-product-catalogue.firebaseapp.com",
    projectId: "thakarshi-product-catalogue",
    storageBucket: "thakarshi-product-catalogue.appspot.com",
    messagingSenderId: "149758378550",
    appId: "1:149758378550:web:2b6def7e29932dddf34e97"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let allProducts = []; 
let currentCategory = 'all'; 
let currentSearchTerm = ''; 
let isLoginMode = true; 
const selectedItems = new Set(); 

let currentPage = 1;
const itemsPerPage = 12; 

let pdImagesArray = [];
let pdCurrentIndex = 0;
let pdCurrentProductId = null;

const authStatusEl = document.getElementById('authStatus');
const productsSection = document.getElementById('productsSection');
const openCartModalBtn = document.getElementById('openCartModal');
const slideOutCart = document.getElementById('slideOutCart');
const cartOverlay = document.getElementById('cartOverlay');
const closeSlideCart = document.getElementById('closeSlideCart');
const selectedList = document.getElementById('selectedList');
const emptyCartMsg = document.getElementById('emptyCartMsg');
const proceedToInquiryBtn = document.getElementById('proceedToInquiryBtn');
const toast = document.getElementById('toast');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const loadMoreContainer = document.getElementById('loadMoreContainer');
const signInModal = document.getElementById('signInModal');
const cartModal = document.getElementById('cartModal');
const closeSignInModal = document.getElementById('closeSignInModal');
const closeCartModal = document.getElementById('closeCartModal');
const modalAuthForm = document.getElementById('modalAuthForm');
const modalAuthSubmit = document.getElementById('modalAuthSubmit');
const modalToggleLink = document.getElementById('modalToggleLink');
const modalAuthMsg = document.getElementById('modalAuthMsg');
const modalInquiryForm = document.getElementById('modalInquiryForm');
const modalSubmitBtn = document.getElementById('modalSubmitBtn');
const modalFormStatus = document.getElementById('modalFormStatus');

// HELPER FUNCTION: Opens the Auth Modal in specific mode
function openAuthModal(mode) {
    isLoginMode = (mode === 'login');
    modalAuthSubmit.textContent = isLoginMode ? 'Sign In' : 'Sign Up';
    modalToggleLink.innerHTML = isLoginMode ? 'Create one' : 'Sign in';
    modalToggleLink.previousSibling.textContent = isLoginMode ? 'Don’t have an account? ' : 'Already have an account? ';
    modalAuthMsg.textContent = '';
    signInModal.style.display = 'block';
}

auth.onAuthStateChanged(async user => {
    if (user) {
        let adminButtonHtml = '';
        try {
            const adminDoc = await db.collection('admins').doc(user.email).get();
            if (adminDoc.exists) {
                adminButtonHtml = `<a href="admin.html" class="btn-primary" style="padding: 5px 15px; font-size: 0.9rem; background-color: #1a1a1a;">Admin Panel</a>`;
            }
        } catch (error) {}

        authStatusEl.innerHTML = `
            <span>Signed in as <strong>${user.email}</strong></span>
            ${adminButtonHtml}
            <button id="signOutBtn" class="btn-primary" style="padding: 5px 15px; font-size: 0.9rem;">Sign out</button>
        `;
        openCartModalBtn.style.display = 'inline-block';
        signInModal.style.display = 'none';
        document.getElementById('signOutBtn').addEventListener('click', () => auth.signOut());
    } else {
        // Show Sign In / Sign Up buttons directly on screen if logged out
        authStatusEl.innerHTML = `
            <span style="color: #666; margin-right: 10px; font-weight: 500;">Login to create an inquiry list:</span>
            <button id="mainSignInBtn" class="btn-primary" style="background-color: transparent; color: #1a1a1a; border: 2px solid #1a1a1a; padding: 6px 20px; font-size: 0.95rem;">Sign In</button>
            <button id="mainSignUpBtn" class="btn-primary" style="background-color: #1a1a1a; padding: 6px 20px; font-size: 0.95rem;">Sign Up</button>
        `;
        document.getElementById('mainSignInBtn').addEventListener('click', () => openAuthModal('login'));
        document.getElementById('mainSignUpBtn').addEventListener('click', () => openAuthModal('signup'));

        openCartModalBtn.style.display = 'none';
        selectedItems.clear();
        updateSelectedUI();
    }
});

function loadContactSettings() {
    db.collection('settings').doc('contactInfo').onSnapshot(doc => {
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('connectSection').style.display = 'block';
            document.getElementById('connectDesc').textContent = data.desc || 'We supply premium textiles across India.';
            let gridHtml = '';
            if (data.headAddress || data.headPhone || data.headEmail) {
                gridHtml += `<div class="contact-card"><h3>🏢 Head Office</h3>${data.headAddress ? `<p><strong>📍 Address:</strong> ${data.headAddress}</p>` : ''}${data.headPhone ? `<p><strong>📞 Phone:</strong> ${data.headPhone}</p>` : ''}${data.headEmail ? `<p><strong>✉️ Email:</strong> ${data.headEmail}</p>` : ''}</div>`;
            }
            if (data.branchAddress || data.branchPhone || data.branchHours) {
                gridHtml += `<div class="contact-card"><h3>🏭 Branch Office</h3>${data.branchAddress ? `<p><strong>📍 Address:</strong> ${data.branchAddress}</p>` : ''}${data.branchPhone ? `<p><strong>📞 Phone:</strong> ${data.branchPhone}</p>` : ''}${data.branchHours ? `<p><strong>🕒 Hours:</strong> ${data.branchHours}</p>` : ''}</div>`;
            }
            document.getElementById('contactGrid').innerHTML = gridHtml;
        } else {
            document.getElementById('connectSection').style.display = 'none';
        }
    });
}

modalAuthForm.addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('modalEmail').value.trim();
    const password = document.getElementById('modalPassword').value.trim();
    modalAuthMsg.textContent = '';
    modalAuthSubmit.disabled = true;

    const authPromise = isLoginMode 
        ? auth.signInWithEmailAndPassword(email, password)
        : auth.createUserWithEmailAndPassword(email, password);

    authPromise.catch(err => {
        modalAuthMsg.textContent = err.message;
        modalAuthSubmit.disabled = false;
    });
});

modalToggleLink.addEventListener('click', e => {
    e.preventDefault();
    openAuthModal(!isLoginMode ? 'login' : 'signup');
});

openCartModalBtn.onclick = () => { slideOutCart.classList.add('open'); cartOverlay.classList.add('active'); };
function closeCartDrawer() { slideOutCart.classList.remove('open'); cartOverlay.classList.remove('active'); }
closeSlideCart.onclick = closeCartDrawer;
cartOverlay.onclick = closeCartDrawer;

proceedToInquiryBtn.onclick = () => {
    closeCartDrawer();
    document.getElementById('modalSelectedProducts').value = JSON.stringify(Array.from(selectedItems));
    cartModal.style.display = 'block';
};

closeSignInModal.onclick = () => { signInModal.style.display = 'none'; };
closeCartModal.onclick = () => { cartModal.style.display = 'none'; };
window.onclick = e => {
    if (e.target === signInModal) signInModal.style.display = 'none';
    if (e.target === cartModal) cartModal.style.display = 'none';
    if (e.target.id === 'productDetailsModal') closeProductModal();
};

function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

function scrollGallery(productId, direction) {
    const gallery = document.getElementById(`gallery-${productId}`);
    if (gallery) {
        const scrollAmount = gallery.offsetWidth;
        gallery.scrollBy({ left: scrollAmount * direction, behavior: 'smooth' });
    }
}

function openProductModal(id) {
    const product = allProducts.find(p => p.id === id);
    if (!product) return;
    
    pdCurrentProductId = id;
    if (product.imageUrls && product.imageUrls.length > 0) {
        pdImagesArray = product.imageUrls;
    } else if (product.imageUrl) {
        pdImagesArray = [product.imageUrl];
    } else {
        pdImagesArray = ['default.jpg'];
    }
    pdCurrentIndex = 0;
    
    document.getElementById('pdMainImage').src = pdImagesArray[pdCurrentIndex];
    document.getElementById('pdPrevBtn').style.display = pdImagesArray.length > 1 ? 'flex' : 'none';
    document.getElementById('pdNextBtn').style.display = pdImagesArray.length > 1 ? 'flex' : 'none';
    document.getElementById('pdCategory').textContent = product.category || 'Other';
    document.getElementById('pdName').textContent = product.name || 'Unnamed Product';
    
    const uom = product.uom || 'meter';
    const priceStr = product.price ? parseFloat(product.price).toLocaleString() : 'Request Price';
    document.getElementById('pdPrice').textContent = `₹${priceStr} / ${uom}`;
    document.getElementById('pdDesc').textContent = product.description || 'No additional details available for this fabric.';
    
    const addBtn = document.getElementById('pdAddBtn');
    addBtn.dataset.id = id; 
    if (selectedItems.has(id)) {
        addBtn.textContent = 'Added to Inquiry ✓';
        addBtn.style.backgroundColor = '#28a745';
    } else {
        addBtn.textContent = 'Add to Inquiry';
        addBtn.style.backgroundColor = '#1a1a1a';
    }
    
    document.getElementById('productDetailsModal').classList.add('show-modal');
}

function closeProductModal() {
    document.getElementById('productDetailsModal').classList.remove('show-modal');
    pdCurrentProductId = null;
}

function changePdImage(direction) {
    pdCurrentIndex += direction;
    if (pdCurrentIndex < 0) pdCurrentIndex = pdImagesArray.length - 1;
    if (pdCurrentIndex >= pdImagesArray.length) pdCurrentIndex = 0;
    document.getElementById('pdMainImage').src = pdImagesArray[pdCurrentIndex];
}

function loadProductsFromFirestore() {
    productsSection.innerHTML = `
        <div class="category-filters" style="margin-top: 10px;">
            <button class="filter-pill active" data-filter="all">All Fabrics</button>
            <button class="filter-pill" data-filter="cotton">Cotton</button>
            <button class="filter-pill" data-filter="silk">Silk</button>
            <button class="filter-pill" data-filter="linen">Linen</button>
            <button class="filter-pill" data-filter="blend">Blends</button>
        </div>
        <div class="search-sort-container" style="display:flex; justify-content:space-between; margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="Search products..." style="padding: 10px; border-radius: 20px; border: 1px solid #ddd; flex-grow: 1; max-width: 300px;">
        </div>
        <div id="productsGrid" class="product-grid">
            ${generateSkeletons()}
        </div>
    `;

    db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
        allProducts = [];
        snapshot.forEach(doc => { allProducts.push({ id: doc.id, ...doc.data() }); });
        setupFilterListeners();
        renderProducts(true); 
    });
}

loadMoreBtn.addEventListener('click', () => {
    currentPage++;
    renderProducts(false); 
});

function renderProducts(resetPage = true) {
    if (resetPage) currentPage = 1;
    
    const productsGrid = document.getElementById('productsGrid');
    
    let filteredProducts = allProducts.filter(product => {
        if (product.isAvailable === false) return false;
        const matchesCategory = currentCategory === 'all' || (product.category && product.category.toLowerCase() === currentCategory.toLowerCase());
        const matchesSearch = (product.name?.toLowerCase().includes(currentSearchTerm)) || (product.category?.toLowerCase().includes(currentSearchTerm));
        return matchesCategory && matchesSearch;
    });

    if (resetPage) productsGrid.innerHTML = ''; 

    if (filteredProducts.length === 0) {
        productsGrid.innerHTML = '<p class="no-results" style="grid-column: 1 / -1; text-align: center; color: #666; margin-top: 20px;">No products match your search or filter.</p>';
        loadMoreContainer.style.display = 'none';
        return;
    }

    const startIndex = resetPage ? 0 : (currentPage - 1) * itemsPerPage;
    const endIndex = currentPage * itemsPerPage;
    const productsToRender = filteredProducts.slice(startIndex, endIndex);

    productsToRender.forEach(product => {
        const card = document.createElement('article');
        card.className = 'product-card';
        
        let imagesHtml = '';
        let hasMultipleImages = false;

        if (product.imageUrls && product.imageUrls.length > 1) {
            hasMultipleImages = true;
            imagesHtml = product.imageUrls.map(url => `<img src="${url}" alt="${product.name}" loading="lazy" onclick="openProductModal('${product.id}')">`).join('');
        } else if (product.imageUrls && product.imageUrls.length === 1) {
            imagesHtml = `<img src="${product.imageUrls[0]}" alt="${product.name}" loading="lazy" onclick="openProductModal('${product.id}')">`;
        } else if (product.imageUrl) {
            imagesHtml = `<img src="${product.imageUrl}" alt="${product.name}" loading="lazy" onclick="openProductModal('${product.id}')">`;
        } else {
            imagesHtml = `<img src="default.jpg" alt="${product.name}" loading="lazy" onclick="openProductModal('${product.id}')">`;
        }
        
        const descriptionHtml = product.description 
            ? `<p style="font-size: 0.85rem; color: #666; margin-bottom: 12px; line-height: 1.4;">${product.description}</p>` 
            : '';
            
        const uom = product.uom || 'meter';
        const priceStr = product.price ? parseFloat(product.price).toLocaleString() : 'Request Price';

        card.innerHTML = `
            <div class="product-media">
                <div class="product-gallery" id="gallery-${product.id}">
                    ${imagesHtml}
                </div>
                ${hasMultipleImages ? `
                    <button class="gallery-btn prev-btn" onclick="scrollGallery('${product.id}', -1)">&#10094;</button>
                    <button class="gallery-btn next-btn" onclick="scrollGallery('${product.id}', 1)">&#10095;</button>
                    <div class="gallery-indicator">Swipe for more</div>
                ` : ''}
            </div>
            <div class="product-info">
                <span class="product-category">${product.category || 'Other'}</span>
                <h3 class="product-title hover-link" onclick="openProductModal('${product.id}')" title="Click to view details">${product.name || 'Unnamed Product'}</h3>
                ${descriptionHtml}
                <p class="product-price">₹${priceStr} / ${uom}</p>
                <div class="product-actions">
                    <button type="button" class="btn-add-inquiry ${selectedItems.has(product.id) ? 'added' : ''}" data-id="${product.id}">
                        ${selectedItems.has(product.id) ? 'Added ✓' : 'Add to Inquiry'}
                    </button>
                </div>
            </div>
        `;
        productsGrid.appendChild(card);
    });

    document.querySelectorAll('.btn-add-inquiry').forEach(btn => {
        btn.removeEventListener('click', toggleSelection);
        btn.addEventListener('click', toggleSelection);
    });

    if (filteredProducts.length > endIndex) {
        loadMoreContainer.style.display = 'block';
    } else {
        loadMoreContainer.style.display = 'none';
    }
}

function setupFilterListeners() {
    const pills = document.querySelectorAll('.filter-pill');
    pills.forEach(pill => {
        pill.addEventListener('click', (e) => {
            pills.forEach(p => p.classList.remove('active'));
            e.target.classList.add('active');
            currentCategory = e.target.dataset.filter;
            renderProducts(true); 
        });
    });

    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.replaceWith(searchInput.cloneNode(true));
        const newSearchInput = document.getElementById('searchInput');
        newSearchInput.addEventListener('input', (e) => {
            currentSearchTerm = e.target.value.toLowerCase().trim();
            renderProducts(true); 
        });
    }
}

function generateSkeletons() {
    let skeletons = '';
    for(let i=0; i<8; i++) {
        skeletons += `
        <div class="skeleton-card"><div class="skeleton-media"></div><div class="skeleton-info"><div class="skeleton-text short"></div><div class="skeleton-text medium"></div><div class="skeleton-button"></div></div></div>`;
    }
    return skeletons;
}

function toggleSelection(e) {
    if(!auth.currentUser) {
        openAuthModal('login');
        return;
    }
    
    const id = e.target.dataset.id; 
    
    if (selectedItems.has(id)) {
        selectedItems.delete(id);
        e.target.textContent = 'Add to Inquiry';
        e.target.classList.remove('added');
        e.target.style.backgroundColor = ''; 
        showToast('Removed from inquiry');
    } else {
        selectedItems.add(id);
        e.target.textContent = 'Added ✓';
        e.target.classList.add('added');
        if(e.target.id === 'pdAddBtn') e.target.style.backgroundColor = '#28a745'; 
        showToast('Added to inquiry list!');
    }
    
    updateSelectedUI();
    document.querySelector('.inquiry-btn span').textContent = `(${selectedItems.size})`;
    renderProducts(false); 
}

function updateSelectedUI() {
    selectedList.innerHTML = '';
    if (selectedItems.size === 0) {
        emptyCartMsg.style.display = 'block';
        proceedToInquiryBtn.style.display = 'none';
        return;
    }
    emptyCartMsg.style.display = 'none';
    proceedToInquiryBtn.style.display = 'block';
    
    Array.from(selectedItems).forEach(id => {
        const product = allProducts.find(p => p.id === id);
        if (product) {
            const uom = product.uom || 'meter';
            const li = document.createElement('li');
            li.innerHTML = `
                <div style="flex-grow: 1;">
                    <span style="font-weight: 600; display: block; margin-bottom: 4px;">${product.name || 'Unnamed Product'}</span>
                    <span style="font-size: 0.8rem; color: #666; background: #eee; padding: 2px 6px; border-radius: 4px;">₹${product.price} / ${uom}</span>
                </div>
            `;
            selectedList.appendChild(li);
        }
    });
}

modalInquiryForm.addEventListener('submit', async e => {
    e.preventDefault();
    modalSubmitBtn.disabled = true;
    modalSubmitBtn.textContent = 'Sending…';
    modalFormStatus.style.display = 'none';

    const customerName = document.getElementById('modalName').value.trim();
    const customerEmail = document.getElementById('modalEmail2').value.trim();
    const customerPhone = document.getElementById('modalPhone').value.trim();
    const customerCity = document.getElementById('modalCity').value.trim();
    const customerMessage = document.getElementById('modalMessage').value.trim();
    const selectedArray = Array.from(selectedItems);

    const formData = {
        uid: auth.currentUser.uid,
        name: customerName,
        email: customerEmail,
        phone: customerPhone,
        city: customerCity,
        message: customerMessage,
        selectedProducts: selectedArray,
        status: 'New', 
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {
        await db.collection('inquiries').add(formData);

        const productNames = selectedArray.map(id => {
            const p = allProducts.find(prod => prod.id === id);
            return p ? p.name : id;
        }).join(", ");

        const emailParams = {
            from_name: customerName,
            from_email: customerEmail,
            phone: customerPhone,
            city: customerCity,
            message: customerMessage,
            products: productNames
        };
        
        emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams)
            .then(() => console.log('Email sent successfully'))
            .catch((err) => console.error('Email failed to send', err));

        modalFormStatus.textContent = 'Inquiry sent successfully! We will contact you soon.';
        modalFormStatus.className = 'form-status success';
        modalFormStatus.style.display = 'block';
        modalInquiryForm.reset();
        selectedItems.clear();
        updateSelectedUI();
        document.querySelector('.inquiry-btn span').textContent = `(0)`;
        
        renderProducts(false); 
        
        setTimeout(() => { cartModal.style.display = 'none'; modalFormStatus.style.display = 'none'; }, 2000);
    } catch (err) {
        modalFormStatus.textContent = 'Error: ' + err.message;
        modalFormStatus.className = 'form-status error';
        modalFormStatus.style.display = 'block';
    } finally {
        modalSubmitBtn.disabled = false;
        modalSubmitBtn.textContent = 'Send Inquiry';
    }
});

loadProductsFromFirestore();
loadContactSettings();
</script>
